; ============================================================================
; KCD2_TPVCamera configuration
;
; Most values apply live (save the file and the next frame picks them up). Keys accept named keys, modifier combos
; (LShift+Q), comma-separated alternatives (F3,Gamepad_LB+Gamepad_RB = F3 OR hold LB + press RB), and hex VK codes. See
; the README for details and the full list of supported input names.
; ============================================================================

[Settings]
; LogLevel specifies the logging level: DEBUG, INFO, WARNING, ERROR
; Default: INFO (use DEBUG for troubleshooting)
LogLevel = INFO

; ToggleViewKey switches between first-person and third-person. With AutoEnableTPV on (the default below), the mod
; enters third-person once gameplay loads; press this to drop back to first-person, press again to return.
; Default: F3, or hold LB + press RB on a controller.
ToggleViewKey = F3,Gamepad_LB+Gamepad_RB

; ForceFPVKey always switches to first-person (never toggles). Empty = unbound.
; Default: empty
ForceFPVKey =

; ForceTPVKey always switches to third-person (never toggles). Empty = unbound.
; Default: empty
ForceTPVKey =

; ToggleOverlayKey opens/closes the in-game preset-manager overlay (Dear ImGui), where you can edit, add and save camera
; presets and the UI scale. The overlay only draws over windowed / borderless-windowed (not exclusive fullscreen).
; Default: Home
ToggleOverlayKey = Home

; AutoEnableTPV enters third-person automatically when the game starts (it still eases in only once you are in gameplay,
; not in menus/loading). Set false to start in first-person and switch with ToggleViewKey. Default: true
AutoEnableTPV = true

; AutoEnableOrbit engages free-look orbit automatically when the game starts (takes effect once the third-person view is
; active). Default: false
AutoEnableOrbit = false

; ===== ADVANCED =====
[Advanced]
; Internal tuning. Leave at the default unless instructed otherwise. SelfHealWindow: byte radius the mod scans to
; re-locate its internal offsets after a game update; raise only if a patch moves things further than the default.
; Default: 256
SelfHealWindow = 256

; ===== CAMERA FRAMING =====
[Camera]
; NOTE: the camera framing itself -- follow distance, shoulder offsets, eye height, aim focus, resting yaw/pitch -- is
; PER-PRESET, not set here. Edit it in the in-game overlay (ToggleOverlayKey, default Home); presets live in
; KCD2_TPVCamera_presets.json next to this file. Only the always-on options below remain in the INI.

; ZoomInKey / ZoomOutKey hold to pull the camera closer / push it farther (within the active preset's zoom range).
; Default: LShift+PageUp / LShift+PageDown, or hold LB + D-pad up/down on a controller.
;
; The matching <key>.Consume hides the controller D-pad button used for that zoom direction from the game while the
; combo is held, so adjusting the zoom on a controller does not also open the inventory/map when you finish. Only the
; gamepad D-pad is affected; the LB modifier and the keyboard zoom keys still reach the game. Default: true (set false
; to let the D-pad reach the game as usual).
ZoomInKey = LShift+PageUp,Gamepad_LB+Gamepad_DpadUp
ZoomInKey.Consume = true
ZoomOutKey = LShift+PageDown,Gamepad_LB+Gamepad_DpadDown
ZoomOutKey.Consume = true

; InteractFromCamera makes the game's "look at / press to use" target follow the SCREEN CENTRE in third person. Normally
; KCD2 picks what to use by casting from your character's eye along their look, which the over-the-shoulder camera is
; offset from -- so at close range the crosshair can be on an item you still cannot grab (and it can pick something off
; to the side). With this on, the use-cone is re-aimed from the camera through the crosshair, so what the crosshair is
; on is what you interact with, at any range. Only affects third person (first person is untouched); does not change AI,
; stealth line-of-sight, or where arrows fly. Global toggle (not per-preset). Live-editable.
; Default: true
InteractFromCamera = true

; ViewTransitionDuration eases the first-person <-> third-person switch over this many seconds (smooth in/out) instead
; of snapping. 0 = instant. Live-editable. Default: 0.0
ViewTransitionDuration = 0.0

; ===== FREE-LOOK ORBIT =====
[Orbit]
; NOTE: the orbit FEEL -- sensitivity, pitch limits, return speed, smoothing, level-aim, body-turn, continuous-align --
; is PER-PRESET. Edit it in the overlay (presets in KCD2_TPVCamera_presets.json). Only the toggle key and the always-on
; cursor freeze remain here.

; OrbitToggleKey turns the free-look orbit on/off. While on, the mouse orbits the camera around your character (your
; look stays put), and you can still move and act; movement follows the camera in every direction. Press again to turn
; it off (the camera eases back behind your aim).
; Default: F4, or hold LB + click the left stick (LS) on a controller.
OrbitToggleKey = F4,Gamepad_LB+Gamepad_LS

; OrbitHoldKey is the MOMENTARY free-look key (freelook, as in ArmA / DayZ / PUBG): HOLD it to swing the camera freely
; around your character, then RELEASE to snap straight back to the normal aim camera. It is the hold-style alternative
; to OrbitToggleKey above (which latches on/off) and works independently of it. Empty = unbound, so it is opt-in and
; never clashes with a game key or the toggle. Pick any key you do not otherwise use, e.g. a mouse side button or a
; spare gamepad button. Live-editable. Default: empty
; Example: OrbitHoldKey = Mouse4
OrbitHoldKey =

; FreezeOrbitOnCursor holds the free-look orbit still whenever the game shows the mouse cursor (any UI is up: pause
; menu, inventory, map, corpse/container loot, trade, dialogue). Without it the mod's free-look reads the raw mouse
; before the game freezes look input, so moving the mouse in those screens would keep turning the camera. The orbit
; angle is held and resumes exactly where it was when the UI closes (it does not reset). Turn off if it ever misfires on
; your setup. Live-editable. Default: true
FreezeOrbitOnCursor = true

; ===== CAMERA COLLISION =====
[Collision]
; NOTE: whether collision is ON, the wall gap (CollisionSkin) and the return speed are PER-PRESET -- edit them in the
; overlay. The options below are global (not per-preset) and stay in the INI.

; --- Coverage collision: the optional "smart" see-through mode ---------------------
; UseCoverageCollision is the master switch for this group; the two settings under it only do anything while it is ON.
; When ON, the camera pulls in ONLY when something actually HIDES your character, so thin posts, rails and fences you
; can see past no longer yank the camera, and it keeps out of corners. OFF (the default) = plain collision: the camera
; simply stops at the nearest solid surface (CollisionRadius). Turn it ON if you want the see-through behaviour.
; Live-editable. Default: false
UseCoverageCollision = false

; CoverageThreshold is the fraction of your character (head counts most) an obstacle must cover before the camera pulls
; in. Lower = pulls in more eagerly; higher = ignores more; 0 = collide on ANYTHING. Only used while
; UseCoverageCollision = true. Live-editable. Default: 0.8
CoverageThreshold = 0.8

; CameraProbeSize keeps the camera off walls beside it (corners, doorways, narrow gaps) that a straight-back check
; cannot see, in meters. Larger = more clearance from side walls; 0 = off. Only used while UseCoverageCollision = true.
; Live-editable. Default: 0.3
CameraProbeSize = 0.3

; --- Render occlusion: cloth roofs (independent of the group above) ----------------
; UseRenderOcclusion stops the camera against tent / awning / canopy cloth and other roofs that carry no real collision,
; so a steep look-down does not bury the view in the fabric. INDEPENDENT of UseCoverageCollision (it handles
; non-physical cloth, not a coverage heuristic), so it works even with the coverage mode off. Live-editable. Default:
; true
UseRenderOcclusion = true

; --- Collision probe: how a hit is detected (always applies) -----------------------
; UseSphereCollision chooses the probe: true sweeps a sphere (smooth, does not pump in tight geometry), false casts a
; single thin ray (cheaper, can jitter on edges). Falls back to the ray automatically if the engine sweep is
; unavailable. Live-editable. Default: true
UseSphereCollision = true

; CollisionRadius is the swept-sphere radius in meters -- the standoff kept from surfaces on the sphere path (the
; per-preset CollisionSkin applies on the thin-ray path instead). Live-editable. Default: 0.15
CollisionRadius = 0.15

; ===== STATE-DRIVEN CAMERA =====
[StateBehavior]
; Switch the view automatically by what you are doing. Each *State value below is a comma-separated list of situations
; (case-insensitive; empty = none). Recognized situations, by group:
;
;   UI (react instantly, ignoring the hold delay below):
;     Menu       pause menu open
;     Overlay    full-screen UI: inventory, map, codex (also covers Dialogue)
;
;   Activity:
;     Combat     a weapon is drawn (drawing a bow or crossbow counts too)
;     Aiming     aiming or drawing a bow or crossbow
;     Dialogue   in a conversation (usually redundant: Overlay covers it)
;
;   Stance (mutually exclusive, only one applies at a time):
;     Mount      riding a horse
;     Crouch     crouching / sneaking ("Stealth" is an accepted alias)
;     Lying      lying down (sleeping in a bed)
;     Sitting    sitting on a bench or chair
;     Kneel      kneeling (e.g. praying)
;     Cart       riding or driving a cart
;
;   Minigame:
;     Minigame   ANY minigame (the umbrella token).
;     Target one instead with its own token: Lockpicking, Dice, Reading,
;     Alchemy, Pickpocketing, Blacksmithing, ForgeBuilder, Sharpening,
;     HerbGathering, HoleDigging, StoneThrowing, BattleArchery, Distract.
;
; Menu/Overlay react instantly; every other situation waits StateSwitchHoldSeconds before reacting, so a brief flicker
; does not pop the view.

; EnableStateBehavior toggles the edge-triggered rules (ForcedFPVState, ForcedTPVState, OrbitExcludeState). It does NOT
; affect the always-on SuppressTPVState gate. Live-editable. Default: true
EnableStateBehavior = true

; ForcedFPVState / ForcedTPVState switch to first / third person ONCE on ENTERING a listed situation; you can still
; toggle manually, and your previous view is restored on exit. If a situation is in both, FPV wins.
ForcedFPVState = Aiming,Cart,Dice,Reading,Alchemy,Blacksmithing,ForgeBuilder,Sharpening,StoneThrowing,BattleArchery
ForcedTPVState = Mount

; OrbitExcludeState turns free-look off on ENTERING a listed situation and back on when you leave (if it was on).
; Auto-disables on entry only, so you can still re-enable it by hand there. Combat and Mount are excluded because
; free-look currently fights the game's own camera control in those states. Live-editable.
OrbitExcludeState = Menu,Overlay,Cart,Combat,Mount,Lockpicking,Dice,Reading,Alchemy,Pickpocketing,Blacksmithing,ForgeBuilder,Sharpening,StoneThrowing,BattleArchery,Distract

; StateSwitchHoldSeconds is how long a situation must last before the camera reacts (0 = instant), so a brief flicker
; does not pop the view. Live-editable.
; Default: 0.2
StateSwitchHoldSeconds = 0.2

; SuppressTPVState is a HARD gate: while in any listed situation it forces first-person and OVERRIDES your manual toggle
; (you cannot switch to third person until it ends), rendering from the game's own camera. Unlike ForcedFPVState (a
; one-time nudge you can override), this locks it, is checked every frame, and is NOT affected by EnableStateBehavior;
; if a situation is in both SuppressTPVState and ForcedTPVState, this gate wins. The default lists only Overlay
; (full-screen UI: inventory/map/codex), so only that hard-locks first person; minigames instead get the softer one-time
; ForcedFPVState nudge above (so you can still switch back to third person in one). Add Minigame (or specific minigames)
; here to hard-lock those too. Live-editable. Default: Overlay
SuppressTPVState = Overlay

; ===== PRESETS =====
[Presets]
; The preset manager applies a full set of camera values per game state. Nine built-in presets (DEFAULT, COMBAT, AIMING,
; MOUNT, STEALTH, LYING, SITTING, KNEEL, CART) cannot be removed and auto-apply by state, in priority order: AIMING when
; drawing/aiming a bow or crossbow (even while crouched), then STEALTH when crouching/sneaking, then COMBAT when a
; weapon is drawn, then MOUNT on horseback, then the pose presets LYING / SITTING / KNEEL / CART, else DEFAULT.
; Add/edit/save your own presets in the in-game overlay (open with ToggleOverlayKey, default Home), and bind a user
; preset to a COMBINATION of states there (e.g. aiming while crouched). When more than one preset matches the current
; state, the one bound to the most matching states wins, so a combo preset overrides the single-state built-ins;
; same-specificity ties use the priority order above. You can also bind a user preset to a specific minigame (or "Any
; minigame") in that panel to frame it in third person. NOTE: a minigame preset only shows if that minigame is NOT in
; SuppressTPVState above (which forces first-person). The default suppresses ALL minigames, so to use a third-person
; framing in one, drop "Minigame" from SuppressTPVState (optionally list the OTHER minigames there to keep them FPV).
; Presets are stored next to this file in KCD2_TPVCamera_presets.json, which is created automatically from the built-in
; defaults on first run -- it is not shipped, so updating the mod never overwrites presets you have tuned.

; Presets are always active -- this mod is preset-driven: the camera framing (distance, height, offsets, and the
; orbit/collision feel) is tuned per preset in the overlay, not in this INI.
;
; PresetBlendSpeed is how quickly the camera eases between presets on a state change. Higher = snappier; 0 = instant
; snap. Live-editable. Default: 8.0
PresetBlendSpeed = 8.0
